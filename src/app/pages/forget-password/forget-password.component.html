<div class="min-h-screen bg-background flex flex-col items-center justify-center p-4 relative font-sans">
  
  <div class="absolute top-6 left-6 flex items-center gap-2 font-bold text-primary text-xl tracking-wide">
    <img src="assets/Icon.png" alt="Taskly Logo" class="w-6 h-6">
    <span class="text-[#041B3C]">TASKLY</span>
  </div>

  <div class="bg-white w-full max-w-[460px] rounded-xl shadow-sm border border-slate-100 p-10 flex flex-col">
    
    <div class="text-center mb-8">
      <h2 class="text-[#041B3C] text-3xl font-bold mb-2">Forgot password?</h2>
      <p class="text-slate-500 text-sm">No worries, we'll send you reset instructions.</p>
    </div>

    <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
      
      <div class="flex flex-col gap-2">
        <label class="text-slate-600 text-xs font-bold uppercase tracking-wider">Email Address</label>
        <input 
          type="email" 
          formControlName="email" 
          placeholder="Enter your email"
          class="w-full px-4 py-3 bg-[#e0e7ff] text-[#041B3C] text-sm rounded-lg border border-slate-300 focus:outline-none focus:border-primary transition-all"
        />
      </div>

      <button 
        type="submit" 
        [disabled]="forgotForm.invalid || isLoading"
        class="w-full bg-[#004ecc] hover:bg-[#003bb3] disabled:bg-slate-400 text-white font-semibold py-3 rounded-lg text-sm transition-all"
      >
        Send Reset Link
      </button>

    </form>

    <div class="text-center mt-6">
      <a routerLink="/login" class="inline-flex items-center gap-2 text-[#004ecc] font-semibold text-sm hover:underline">
        <span>←</span> Back to log in
      </a>
    </div>

   
    <div *ngIf="showSuccessMsg" class="mt-6 p-4 bg-emerald-50 border border-emerald-200 rounded-lg flex items-start gap-3">
      <span class="text-emerald-600 font-bold text-lg">✓</span>
      <p class="text-emerald-800 text-sm">
        If an account exists with this email, we've sent a password reset link.
      </p>
    </div>

    <div *ngIf="showSuccessMsg" class="text-center mt-6 flex flex-col gap-3">
      <span class="text-slate-400 text-xs font-bold uppercase tracking-wider">Didn't receive the email?</span>
      
      <button 
        type="button"
        [disabled]="isResendDisabled"
        class="w-full bg-indigo-50 hover:bg-indigo-100 disabled:bg-slate-100 disabled:text-slate-400 text-[#004ecc] font-semibold py-3 rounded-lg text-sm transition-all flex items-center justify-center gap-2"
      >
        <span>⏱</span> Resend in {{ displayTime }}
      </button>
    </div>

  </div>

</div>
