<div class="min-h-screen bg-background flex items-center justify-center p-4 relative font-sans">
  
  <div class="absolute top-6 left-6 flex items-center gap-2 font-bold text-primary text-xl tracking-wide">
    <img src="assets/Icon.png" alt="Taskly Logo" class="w-6 h-6">
    <span>TASKLY</span>
  </div>

  <div class="bg-white p-8 rounded-2xl shadow-sm max-w-md w-full border border-surface-low">
    
    <h2 class="text-2xl font-bold text-neutral-dark text-center mb-1">Welcome Back</h2>
    <p class="text-neutral-gray text-center mb-6 text-sm">Please enter your details to access your workspace</p>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
      
      <div>
        <label class="block text-xs font-bold text-neutral-gray uppercase tracking-wide mb-2">Email</label>
        <input 
          type="email" 
          formControlName="email"
          placeholder="yourname@company.com" 
          class="w-full px-4 py-3 bg-surface-low text-neutral-dark rounded-xl border border-transparent focus:border-primary focus:bg-white outline-none transition-all text-sm"
        />
        <span *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']" class="text-error text-xs block mt-1">
          Email is required.
        </span>
        <span *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']" class="text-error text-xs block mt-1">
          Please enter a valid email address.
        </span>
      </div>

      <div>
        <label class="block text-xs font-bold text-neutral-gray uppercase tracking-wide mb-2">Password</label>
        <div class="relative">
          <input 
            type="password" 
            formControlName="password"
            placeholder="Enter your password" 
            class="w-full px-4 py-3 bg-surface-low text-neutral-dark rounded-xl border border-transparent focus:border-primary focus:bg-white outline-none transition-all text-sm pr-10"
          />
          <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-gray hover:text-neutral-dark">
            <img src="assets/eye-icon.png" class="h-3">
          </button>
        </div>
        <span *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']" class="text-error text-xs block mt-1">
          Password is required.
        </span>
      </div>

      <div class="flex items-center justify-between text-sm pt-1">
        <label class="flex items-center gap-2 text-neutral-gray cursor-pointer selection:bg-transparent">
          <input type="checkbox" formControlName="rememberMe" class="w-4 h-4 rounded border-neutral-light text-primary focus:ring-primary">
          <span>Remember Me</span>
        </label>
        <button type="button" class="text-primary-container font-semibold hover:underline text-xs">
          Forgot Password?
        </button>
      </div>

      <button 
        type="submit" 
        class="w-full py-3 bg-primary hover:bg-primary-container text-white font-semibold rounded-xl transition-colors shadow-sm mt-2 text-sm"
      >
        Log In
      </button>

      <p class="text-center text-neutral-gray text-sm pt-4">
        Don't have an account? 
        <a routerLink="/sign-up" class="text-primary-container font-bold hover:underline">Sign Up</a>
      </p>

    </form>
  </div>
</div>
