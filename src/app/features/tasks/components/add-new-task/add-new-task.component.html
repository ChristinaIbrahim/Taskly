<div class="max-w-4xl mx-auto p-4 md:p-6">
  <div class="mb-6">
    <div class="text-xs text-gray-400 mb-1">
      PROJECTS <span class="mx-1">></span> PROJECT ALPHA <span class="mx-1">></span> TASKS <span class="mx-1">></span> <span class="text-[#041B3C] font-semibold">NEW TASK</span>
    </div>
    <h1 class="text-2xl font-bold text-[#041B3C]">Create New Task</h1>
    <p class="text-xs text-gray-500 mt-1">Initialize a new work item within the Architectural Workspace ecosystem.</p>
  </div>

  <div class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm">
    <form class="space-y-5">
      <div>
        <label class="block text-[11px] font-bold uppercase text-gray-500 mb-2">Title <span class="text-red-500">*</span></label>
        <input
          type="text"
          placeholder="e.g., Finalize structural schematics"
          class="w-full bg-[#F8FAFC] border border-gray-200 rounded-xl px-4 py-3 text-xs md:text-sm text-[#041B3C] focus:outline-none focus:border-[#004EEB]"
        />
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-[11px] font-bold uppercase text-gray-500 mb-2">Status <span class="text-red-500">*</span></label>
          <div class="relative">
            <select
              class="w-full bg-[#F8FAFC] border border-gray-200 rounded-xl px-4 py-3 text-xs md:text-sm text-[#041B3C] appearance-none focus:outline-none focus:border-[#004EEB] cursor-pointer"
            >
              <option value="TO_DO">TO DO</option>
              <option value="IN_PROGRESS">IN PROGRESS</option>
              <option value="BLOCKED">BLOCKED</option>
              <option value="IN_REVIEW">IN REVIEW</option>
              <option value="READY_FOR_QA">READY FOR QA</option>
              <option value="REOPENED">REOPENED</option>
              <option value="READY_FOR_PRODUCTION">READY FOR PRODUCTION</option>
              <option value="DONE">DONE</option>
            </select>
            <svg class="w-4 h-4 text-gray-400 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </div>
        </div>

        <!-- Assignee -->
        <div>
          <label class="block text-[11px] font-bold uppercase text-gray-500 mb-2">Assignee</label>
          <div class="relative">
            <select
              class="w-full bg-[#F8FAFC] border border-gray-200 rounded-xl px-4 py-3 text-xs md:text-sm text-[#041B3C] appearance-none focus:outline-none focus:border-[#004EEB] cursor-pointer"
            >
              <option value="">Select Team Member</option>
            </select>
            <svg class="w-4 h-4 text-gray-400 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
            </svg>
          </div>
        </div>
      </div>
      <div>
        <label class="block text-[11px] font-bold uppercase text-gray-500 mb-2">Epic</label>
        <div class="relative">
          <select
            class="w-full bg-[#F8FAFC] border border-gray-200 rounded-xl px-4 py-3 text-xs md:text-sm text-[#041B3C] appearance-none focus:outline-none focus:border-[#004EEB] cursor-pointer"
          >
            <option value="">Select Epic Link</option>
          </select>
          <svg class="w-4 h-4 text-gray-400 absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>
      </div>
      <div>
        <label class="block text-[11px] font-bold uppercase text-gray-500 mb-2">Due Date</label>
        <div class="relative">
          <input
            type="date"
            class="w-full bg-[#F8FAFC] border border-gray-200 rounded-xl px-4 py-3 text-xs md:text-sm text-[#041B3C] focus:outline-none focus:border-[#004EEB]"
          />
        </div>
      </div>
      <div>
        <label class="block text-[11px] font-bold uppercase text-gray-500 mb-2">Description</label>
        <textarea
          rows="4"
          placeholder="Provide detailed context for this task..."
          class="w-full bg-[#F8FAFC] border border-gray-200 rounded-xl px-4 py-3 text-xs md:text-sm text-[#041B3C] focus:outline-none focus:border-[#004EEB] resize-none"
        ></textarea>
      </div>
      <div class="flex items-center justify-end gap-3 pt-4 border-t border-gray-100">
        <button
          type="button"
          class="px-5 py-2.5 rounded-xl text-xs font-semibold text-gray-600 hover:bg-gray-100 transition-colors cursor-pointer"
        >
          Back
        </button>
        <button
          type="submit"
          class="bg-[#004EEB] text-white px-6 py-2.5 rounded-xl text-xs font-semibold hover:bg-blue-700 transition-colors shadow-sm cursor-pointer"
        >
          Create Task
        </button>
      </div>
    </form>
  </div>
</div>
