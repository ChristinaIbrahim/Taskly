<div class="p-6 max-w-7xl mx-auto">
  <div class="mb-6 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
    <div>
      <div class="text-xs text-gray-400 mb-1">PROJECTS > PROJECT ALPHA > TASKS</div>
      <h1 class="text-2xl font-bold text-[#041B3C]">Active Workboard</h1>
      <p class="text-xs text-gray-500 mt-1">Curating Project Alpha's production pipeline and milestones.</p>
    </div>
    <div class="flex items-center gap-3">
      <div class="relative">
        <input 
          type="text" 
          placeholder="Search tasks..." 
          class="bg-[#F8FAFC] border border-gray-200 rounded-xl px-4 py-2 text-xs text-[#041B3C] focus:outline-none focus:border-[#004EEB] w-60"
        />
      </div>

      <select 
        class="bg-[#F8FAFC] border border-gray-200 rounded-xl px-4 py-2 text-xs font-semibold text-[#041B3C] focus:outline-none focus:border-[#004EEB] cursor-pointer"
      >
        <option value="board">Board View</option>
        <option value="list">List View</option>
      </select>
    </div>
  </div>

  @if (currentView === 'board') {
    <app-board-view-task [projectId]="projectId"></app-board-view-task>
  } @else {
    <div class="text-xs text-gray-500">List View will appear here</div>
  }
</div>
