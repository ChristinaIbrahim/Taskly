<app-auth-container 
  title="Welcome Back" 
  description="Please enter your details to access your workspace.">

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4 w-full text-start">
    
    @if (errorMessage) {
      <div class="p-3.5 bg-red-50 border border-red-100 text-red-600 rounded-[8px] text-xs flex items-center gap-2.5">
        <span class="font-medium">{{ errorMessage }}</span>
      </div>
    }
    <div class="flex flex-col gap-1 w-full">
      <label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">Email</label>
      <input 
        type="email" 
        formControlName="email" 
        placeholder="yourname@company.com"
        autocomplete="username"
        class="w-full h-[48px] px-4 bg-[#ECF2FF] text-[#041B3C] placeholder-slate-400 rounded-[6px] text-sm focus:outline-none focus:ring-2 focus:ring-[#041B3C]/20 transition-all border border-[#C3C6D6]/40"
        [class.!ring-2]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
        [class.!ring-red-500]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
      
      @if (loginForm.get('email')?.touched && loginForm.get('email')?.invalid) {
        <span class="text-[10px] text-red-500 font-medium mt-1">Please enter a valid email.</span>
      }
    </div>

    <div class="flex flex-col gap-1 w-full">
      <app-form-field
        label="Password"
        placeholder="Enter your password"
        fieldType="password"
        class="custom-blue-input"
        [fieldControl]="loginForm.get('password')"
        [showPasswordToggle]="true"
        [errorMessage]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid ? 'Password is required.' : ''"
      />
    </div>
    <div class="flex items-center justify-between text-xs mt-1">
      <label class="flex items-center gap-2 cursor-pointer text-slate-500 font-medium">
        <input 
          type="checkbox" 
          formControlName="rememberMe" 
          class="rounded border-slate-300 font-bold text-[#434654] focus:ring-[#434654] w-4 h-4 transition-all">
        Remember Me
      </label>
      <button type="button" class="text-[#003D9B] font-bold hover:underline bg-transparent border-0 cursor-pointer">
        Forgot Password?
      </button>
    </div>

    <button 
      type="submit" 
      [disabled]="loginForm.invalid || isLoading"
      class="w-full h-[48px] text-white font-bold rounded-[8px] text-sm shadow-sm transition-all duration-200
             disabled:bg-blue-300 disabled:cursor-not-allowed
             bg-[#003D9B] hover:bg-[#041B3C] active:scale-[0.99] mt-2 flex items-center justify-center gap-2">
      
      @if (isLoading) {
        <span class="animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></span>
        <span>Logging in...</span>
      } @else {
        <span>Log In</span>
      }
    </button>

    <div class="border-t border-[#C3C6D6]/30 pt-[32px] text-center mt-2">
      <span class="text-[#041B3C]/60 text-sm">Don't have an account? </span>
      <a href="#" class="text-[#003D9B] font-bold hover:underline">Sign Up</a>
    </div>

  </form>
</app-auth-container>
