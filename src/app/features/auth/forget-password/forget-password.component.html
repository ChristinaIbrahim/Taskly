<app-auth-container>
  <div class="flex justify-center mb-6 sm:hidden">
    <div class="flex items-center justify-center w-14 h-14 bg-[#DCE4FF] rounded-xl">
      <svg app-icon="forgot-lock" class="w-[28px] h-[28px] text-[#004EEB]"></svg>
    </div>
  </div>

  <div class="text-center mb-6">
    <h2 class="text-[28px] font-bold text-[#0A192F] mb-2">Forgot password?</h2>
    <p class="text-[15px] text-[#4A5568]">No worries, we'll send you reset instructions.</p>
  </div>

  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="space-y-4">
    
    <div>
      <span class="block text-[11px] font-bold text-[#4A5568] tracking-wider mb-[6px]">EMAIL ADDRESS</span>
      <app-form-field
        placeholder="Enter your email"
        fieldType="email"
        [fieldControl]="$any(forgotForm.get('email'))"
        [errorMessage]="(forgotForm.get('email')?.dirty || forgotForm.get('email')?.touched) && forgotForm.get('email')?.invalid ? (forgotForm.get('email')?.errors?.['required'] ? 'Email is required' : 'Please enter a valid email') : ''">
      </app-form-field>
    </div>

    <div class="w-full pt-2">
      <button 
        type="submit" 
        class="w-full bg-[#004EEB] hover:bg-[#003BB3] disabled:opacity-50 text-white font-semibold py-3 px-4 rounded-md transition-colors flex items-center justify-center gap-2"
        [disabled]="forgotForm.invalid || isLoading">
        <span *ngIf="isLoading" class="animate-spin inline-block w-4 h-4 border-2 border-white border-t-transparent rounded-full"></span>
        {{ isLoading ? 'Sending...' : 'Send Reset Link' }}
      </button>
    </div>

    <div class="text-center pt-2">
      <a routerLink="/login" class="inline-flex items-center gap-2 text-[15px] text-[#004EEB] font-semibold hover:underline">
        <svg app-icon="arrow-left" class="w-[16px] h-[16px] text-[#004EEB]"></svg>
        Back to log in
      </a>
    </div>

    <div *ngIf="isSubmittedSuccessfully" class="space-y-4">
      
      <hr class="border-t border-[#E2E8F0] my-6 opacity-70">

     <div class="bg-[#ECFDF5] border border-[#D1FAE5] rounded-lg p-4 flex items-start gap-3">
  
     <svg app-icon="right" class="w-[22px] h-[22px] text-[#065F46] shrink-0 mt-0.5"></svg>
  
    <p class="text-[13px] text-[#065F46] font-medium leading-relaxed text-start m-0">
    If an account exists with this email, we've sent a password reset link.
     </p>
   </div>

      <div class="text-center pt-2">
        <span class="block text-[11px] font-bold text-[#4A5568] mb-2">
          DIDN'T RECEIVE THE EMAIL? <span class="text-xs text-gray-400">({{ resendTrials }} trials left)</span>
        </span>
        
        <button 
          type="button" 
          (click)="onResend()"
          class="w-full font-semibold py-[10px] px-4 rounded-md flex items-center justify-center gap-2 text-[14px] transition-all"
          [ngClass]="timeLeft > 0 || resendTrials === 0 ? 'bg-[#F0F2FA] text-[#5C6A85] cursor-not-allowed' : 'bg-[#004EEB] text-white hover:bg-[#003BB3]'"
          [disabled]="timeLeft > 0 || resendTrials === 0 || isLoading">
          
          <svg app-icon="clock" class="w-[16px] h-[16px]" [ngClass]="timeLeft > 0 ? 'text-[#5C6A85]' : 'text-white'"></svg>
          
          <span *ngIf="timeLeft > 0">Resend in {{ timerDisplay }}</span>
          <span *ngIf="timeLeft === 0 && resendTrials > 0">Resend Email</span>
          <span *ngIf="resendTrials === 0">No trials left</span>
        </button>
      </div>

    </div>

  </form>
</app-auth-container>
