<div
  (click)="onCardClick()"
  class="relative overflow-hidden bg-white border border-[#E2E8F0] rounded-xl md:rounded-2xl p-5 md:p-6 shadow-sm hover:shadow-md transition-all flex flex-col justify-between cursor-pointer"
>
  <div class="hidden md:block absolute top-0 left-0 w-1.5 h-full bg-[#65DCA4]"></div>

  <div>
    <div class="flex items-center justify-between mb-3 md:pl-2">
      <span
        class="text-[11px] font-bold px-2.5 py-1 rounded-md tracking-wider bg-[#EFF6FF] text-[#004EEB] md:bg-[#65DCA4] md:text-[#041B3C]"
      >
        {{ epic.epic_id || 'EPIC-00' }}
      </span>
      <button
        class="text-gray-400 hover:text-gray-600 focus:outline-none cursor-pointer"
        (click)="$event.stopPropagation()"
      >
        <svg
          class="w-5 h-5"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 12h.01M12 12h.01M19 12h.01"
          />
        </svg>
      </button>
    </div>

    <h3 class="text-[16px] font-bold text-[#041B3C] mb-4 md:mb-6 md:pl-2 line-clamp-2">
      {{ epic.title }}
    </h3>

    <div class="flex items-center justify-between md:justify-start md:gap-3 mb-1 md:mb-4 md:pl-2">
      <div class="flex items-center gap-2 md:gap-3">
        <div
          class="w-7 h-7 md:w-9 md:h-9 rounded-full flex items-center justify-center font-bold text-[11px] md:text-xs text-white bg-[#004EEB] md:bg-[#10B981]"
        >
          {{ getInitials(epic.assignee?.name) }}
        </div>
        <div>
          <span
            class="block text-[10px] text-gray-400 leading-none mb-0.5 md:uppercase md:tracking-wider md:font-semibold"
            >Assignee</span
          >
          <span class="text-[#041B3C] font-semibold text-[12px] md:text-[13px]">{{
            epic.assignee?.name || 'Unassigned'
          }}</span>
        </div>
      </div>

      <div class="text-right md:hidden">
        <span
          class="block text-[10px] text-gray-400 leading-none mb-0.5 uppercase"
          >Deadline</span
        >
        <span class="text-[#64748B] text-[12px] font-medium">{{
          epic.deadline | date: 'MMM d, y'
        }}</span>
      </div>
    </div>
  </div>

  <div class="hidden md:block md:pl-2">
    <div class="border-t border-gray-100 my-2"></div>
    <div class="flex items-center justify-between text-[12px] text-gray-500 pt-2">
      <span class="flex items-center gap-1.5">
        <svg
          class="w-4 h-4 text-gray-400"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"
          />
        </svg>
        Created by:
        <strong class="text-gray-700 font-medium">{{
          epic.created_by?.name || 'Unknown'
        }}</strong>
      </span>
      <span class="flex items-center gap-1.5">
        <svg
          class="w-4 h-4 text-gray-400"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
          />
        </svg>
        {{ epic.created_at | date: 'd MMM yyyy' }}
      </span>
    </div>
  </div>
</div>
