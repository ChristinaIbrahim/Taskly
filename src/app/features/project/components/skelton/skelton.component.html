<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
  @for (item of [1, 2, 3]; track $index) {
    <div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm flex flex-col justify-between min-h-[220px] animate-pulse">
      <div>
        <div class="h-6 bg-gray-200 rounded-md w-3/4"></div>
        <div class="space-y-2 mt-4">
          <div class="h-4 bg-gray-200 rounded-md w-full"></div>
          <div class="h-4 bg-gray-200 rounded-md w-5/6"></div>
        </div>
      </div>
      <div class="flex items-center justify-between border-t border-gray-50 pt-4 mt-4">
        <div class="h-3 bg-gray-200 rounded-md w-16"></div>
        <div class="h-4 bg-gray-200 rounded-md w-24"></div>
      </div>
    </div>
  }
</div>
