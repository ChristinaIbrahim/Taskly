<div class="bg-white border border-gray-100 rounded-2xl p-6 shadow-sm flex flex-col justify-between min-h-[220px]">
  <div>
    <h3 class="text-xl font-bold text-[#0A192F] tracking-tight hover:text-[#004EEB] cursor-pointer transition-colors">
      {{ project.name }}
    </h3>
    
    <p class="text-gray-500 text-sm mt-3 leading-relaxed line-clamp-3">
      {{ project.description }}
    </p>
  </div>

  <div class="flex items-center justify-between border-t border-gray-50 pt-4 mt-4">
    <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Created At</span>
    <span class="text-sm font-semibold text-[#0A192F]">
      {{ project.createdAt | date:'dd MMM yyyy' }}
    </span>
  </div>
</div>
