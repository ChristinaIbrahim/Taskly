<div class="flex flex-col w-full text-left gap-1">
  @if (label) {
    <label
      [for]="fieldId"
      class="text-[11px] font-bold text-slate-500 uppercase tracking-wider"
    >
      {{ label }}
      @if (isOptional) {
        <span class="text-[#737685] text-[10px] lowercase">(optional)</span>
      }
    </label>
  }

  <div class="w-full relative flex items-center">
    <input
      [id]="fieldId"
      [type]="inputType"
      [placeholder]="placeholder"
      [formControl]="fieldControl"
      [attr.autocomplete]="fieldType === 'password' ? 'new-password' : 'none'"
      class="w-full pl-4 pr-11 py-2.5 bg-[#D7E2FF] text-slate-800 placeholder-slate-400 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/55 transition-all border-none"
      [class.!ring-2]="errorMessage"
      [class.!ring-red-500]="errorMessage"
    />

    @if (showPasswordToggle) {
      <button
        type="button"
        class="absolute right-4 top-[50%] -translate-y-1/2 w-[22px] h-[24px] flex items-center justify-center text-[#737685] hover:text-slate-600 transition-colors focus:outline-none cursor-pointer"
        (click)="toggleVisibility()"
      >
        @if (isVisible) {
          <svg class="w-5 h-5 text-[#5C6A85]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" />
          </svg>
        } @else {
          <svg class="w-5 h-5 text-[#5C6A85]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
          </svg>
        }
      </button>
    }
  </div>

  @if (errorMessage) {
    <span class="text-[10px] text-red-500 font-medium mt-0.5">
      {{ errorMessage }}
    </span>
  }

  @if (hint && !errorMessage) {
    <span class="text-[10px] text-slate-400 mt-0.5">
      {{ hint }}
    </span>
  }
</div>
